<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemas del Soñador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo-placeholder">SANTANDER</div>
            <h1>Gemas del Soñador</h1>
            <p>Escanea los portales, supera los desafios y desbloquea las gemas del soñador.</p>
        </header>

        <div class="inventory">
            <div class="gem-slot" id="gem-0">
                <img src="gema1.png" class="gem-img locked" alt="Gema 1">
            </div>
            <div class="gem-slot" id="gem-1">
                <img src="gema2.png" class="gem-img locked" alt="Gema 2">
            </div>
            <div class="gem-slot" id="gem-2">
                <img src="gema3.png" class="gem-img locked" alt="Gema 3">
            </div>
            <div class="gem-slot" id="gem-3">
                <img src="gema4.png" class="gem-img locked" alt="Gema 4">
            </div>
        </div>

        <div class="status-bar">
            Progreso: <span id="progress-text">0/4</span>
        </div>

        <button id="start-ar" onclick="location.href='ar-view.html'">
            ✨ ESCANEAR PORTAL
        </button>
    </div>
    <script src="script.js"></script>
    <script>window.onload = () => updateInventoryUI();</script>
</body>
</html>
