<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gema Quest - Activación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo-placeholder">SANTANDER</div>
            <h1>Gema Quest</h1>
            <p>Explora el evento y recolecta las 3 gemas de poder.</p>
        </header>

        <div class="inventory">
            <div class="gem-slot" id="gem-0"><span>?</span><p>Agilidad</p></div>
            <div class="gem-slot" id="gem-1"><span>?</span><p>Prosperidad</p></div>
            <div class="gem-slot" id="gem-2"><span>?</span><p>Sustentabilidad</p></div>
        </div>

        <div class="status-bar">
            Progreso: <span id="progress-text">0/3</span>
        </div>

        <button id="start-ar" onclick="location.href='ar-view.html'">
            ✨ INICIAR ESCANEO
        </button>
    </div>
    <script src="script.js"></script>
    <script>window.onload = () => updateInventoryUI();</script>
</body>
</html>
