<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="loading-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <p id="loading-text">ACTIVANDO GEMA...</p>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='index.html'">✕ Salir</button>

    <div id="game-overlay" class="hidden">
        <div class="modal">
            <h2>¡Gema Localizada!</h2>
            <p>Sincroniza la energía tocando los puntos rojos.</p>
            <div id="game-area"><button id="tap-target">⚡</button></div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="gema-glb" src="crear3D.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="0 10 0" intensity="0.5"></a-light>

        <a-entity id="anchor0" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#gema-glb" scale="00.1 00.1 00.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-entity id="effect0" particle-system="preset: explosion; color: #e30613; size: 0.1; enabled: false"></a-entity>
        </a-entity>

        <a-entity id="anchor1" mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#gema-glb" scale="0.02 00.2 00.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-entity id="effect1" particle-system="preset: explosion; color: #ffcc00; size: 0.1; enabled: false"></a-entity>
        </a-entity>

        <a-entity id="anchor2" mindar-image-target="targetIndex: 2">
            <a-gltf-model src="#gema-glb" scale="00.2 00.2 00.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-entity id="effect2" particle-system="preset: explosion; color: #00cc66; size: 0.1; enabled: false"></a-entity>
        </a-entity>
    </a-scene>

    <script src="script.js"></script>
    <script>
        // Ocultar cargador cuando la escena AR esté lista
        document.querySelector('a-scene').addEventListener('renderstart', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1500);
        });

        // Detección de pórticos
        document.querySelectorAll('a-entity[mindar-image-target]').forEach((el, index) => {
            el.addEventListener("targetFound", () => {
                if(!isGemCollected(index)) {
                    document.getElementById('game-overlay').classList.remove('hidden');
                    iniciarMiniJuego(() => {
                        collectGem(index);
                        const effect = document.getElementById(`effect${index}`);
                        effect.setAttribute('particle-system', 'enabled', true);
                        setTimeout(() => {
                            effect.setAttribute('particle-system', 'enabled', false);
                            document.getElementById('game-overlay').classList.add('hidden');
                        }, 1200);
                    });
                }
            });
        });
    </script>
</body>
</html>
