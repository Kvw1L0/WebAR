<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner AR - Gema Quest</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="loading-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <p id="loading-text">INICIANDO CÁMARA...</p>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='index.html'">✕ Salir</button>

    <div id="game-overlay" class="hidden">
        
        <div id="screen-start" class="game-screen">
            <h1 class="game-title">¡BATIPHONE!</h1>
            <p>Escribe tu nombre y agita el teléfono para sincronizar la gema.</p>
            <input type="text" id="player-name" placeholder="Tu Nombre">
            <button id="btn-play">¡JUGAR!</button>
        </div>

        <div id="game-container" class="logo-wrapper" onclick="Batiphone.simulateShake()" style="display: none;">
            <img src="logo.png" class="logo-img ghost" alt="Logo Ghost">
            <img src="logo.png" id="full-image" class="logo-img full-color" alt="Logo Color">
            <p id="hint-text" class="tap-hint">¡AGITA EL TELÉFONO!</p>
        </div>

        <div id="screen-result" class="game-screen hidden">
            <h1 class="game-title">¡Misión Cumplida!</h1>
            <p>Tiempo de sincronización:</p>
            <p class="big-text" id="final-time">0.00s</p>
            <button id="btn-claim-gem">RECOLECTAR GEMA</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="gema-glb" src="crear3D.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="directional" position="0 10 0" intensity="0.5"></a-light>

        <a-entity id="anchor0" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#gema-glb" scale="0.1 0.1 0.1" position="0 0 0.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-entity id="effect0" position="0 0 0.2" particle-system="preset: explosion; color: #ec0000; size: 0.1; enabled: false"></a-entity>
        </a-entity>

        <a-entity id="anchor1" mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#gema-glb" scale="0.1 0.1 0.1" position="0 0 0.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-entity id="effect1" position="0 0 0.2" particle-system="preset: explosion; color: #ffcc00; size: 0.1; enabled: false"></a-entity>
        </a-entity>

        <a-entity id="anchor2" mindar-image-target="targetIndex: 2">
            <a-gltf-model src="#gema-glb" scale="0.1 0.1 0.1" position="0 0 0.2" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-entity id="effect2" position="0 0 0.2" particle-system="preset: explosion; color: #00cc66; size: 0.1; enabled: false"></a-entity>
        </a-entity>
    </a-scene>

    <script src="script.js"></script>
    <script>
        document.querySelector('a-scene').addEventListener('renderstart', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1000);
        });

        document.querySelectorAll('a-entity[mindar-image-target]').forEach((el, index) => {
            el.addEventListener("targetFound", () => {
                if(!isGemCollected(index)) {
                    Batiphone.init(index);
                }
            });
        });
    </script>
</body>
</html>
