<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner - Gemas del Soñador</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        .a-enter-vr { display: none !important; }
        .mindar-ui-overlay { z-index: 2; }
        video { z-index: -2 !important; position: absolute !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; }
        .a-canvas { z-index: -1 !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <p id="loading-text">INICIANDO ESCÁNER...</p>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='index.html'">✕ Volver</button>

    <div id="game-overlay" class="hidden">
        <div id="screen-start" class="game-screen">
            <h1 class="game-title">¡BATIPHONE!</h1>
            <p style="color:white; margin-bottom:20px;">Escribe tu nombre y agita el teléfono para sincronizar tu energía.</p>
            <input type="text" id="player-name" placeholder="Tu Nombre">
            <button id="btn-play">¡JUGAR!</button>
        </div>
        <div id="game-container" class="logo-wrapper" onclick="Batiphone.simulateShake()" style="display: none;">
            <img src="logo.png" class="logo-img ghost" alt="Logo Ghost">
            <img src="logo.png" id="full-image" class="logo-img full-color" alt="Logo Color">
            <p id="hint-text" class="tap-hint">¡AGITA EL TELÉFONO!</p>
        </div>
        <div id="screen-result" class="game-screen hidden">
            <h1 class="game-title">¡Misión Cumplida!</h1>
            <p style="color:white;">Tiempo de sincronización:</p>
            <p class="big-text" id="final-time">0.00s</p>
            <button id="btn-claim-gem">REVELAR GEMA</button>
        </div>
        <canvas id="confetti-canvas"></canvas>
    </div>

    <div id="zelda-overlay" class="hidden">
        <div class="sunburst"></div>
        <img id="zelda-gem-img" src="" class="zelda-gem-icon" alt="Gema">
        <div class="zelda-text" id="zelda-message">¡GEMA DESPERTADA!</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1" color-space="sRGB" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0"></a-entity>
        <a-entity mindar-image-target="targetIndex: 1"></a-entity>
        <a-entity mindar-image-target="targetIndex: 2"></a-entity>
        <a-entity mindar-image-target="targetIndex: 3"></a-entity>
    </a-scene>

    <script src="script.js"></script>
    <script>
        const sceneEl = document.querySelector('a-scene');
        const loader = document.getElementById('loading-overlay');

        sceneEl.addEventListener('arReady', () => {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        });

        // Al encontrar la imagen, lanzamos Batiphone INMEDIATAMENTE
        document.querySelectorAll('a-entity[mindar-image-target]').forEach((el, index) => {
            el.addEventListener("targetFound", () => {
                if(!isGemCollected(index) && !Batiphone.active && document.getElementById('game-overlay').classList.contains('hidden')) {
                    Batiphone.init(index);
                }
            });
        });
    </script>
</body>
</html>
