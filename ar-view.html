<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escáner AR - Gema Quest</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
        if (typeof THREE !== 'undefined') {
            if (!THREE.Math) { THREE.Math = THREE.MathUtils; }
            if (THREE.BufferGeometry && !THREE.BufferGeometry.prototype.addAttribute) {
                THREE.BufferGeometry.prototype.addAttribute = function (name, attribute) {
                    return this.setAttribute(name, attribute);
                };
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent !important; }
        .mindar-ui-overlay { z-index: 2; }
        video { z-index: -2 !important; position: absolute !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; }
        .a-canvas { z-index: -1 !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loading-overlay" style="position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s;">
        <div class="loader-content" style="text-align: center;">
            <div style="width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid #ec0000; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <p id="loading-text" style="font-weight: bold; color: #ec0000; font-family: sans-serif;">INICIANDO CÁMARA...</p>
        </div>
    </div>

    <button class="back-btn" onclick="location.href='index.html'">✕ Salir</button>

    <div id="game-overlay" class="hidden">
        <div id="screen-start" class="game-screen">
            <h1 class="game-title">¡BATIPHONE!</h1>
            <p style="color:white; margin-bottom:20px;">Escribe tu nombre y agita el teléfono para sincronizar la gema.</p>
            <input type="text" id="player-name" placeholder="Tu Nombre">
            <button id="btn-play">¡JUGAR!</button>
        </div>
        <div id="game-container" class="logo-wrapper" onclick="Batiphone.simulateShake()" style="display: none;">
            <img src="logo.png" class="logo-img ghost" alt="Logo Ghost">
            <img src="logo.png" id="full-image" class="logo-img full-color" alt="Logo Color">
            <p id="hint-text" class="tap-hint">¡AGITA EL TELÉFONO!</p>
        </div>
        <div id="screen-result" class="game-screen hidden">
            <h1 class="game-title">¡Misión Cumplida!</h1>
            <p style="color:white;">Tiempo de sincronización:</p>
            <p class="big-text" id="final-time">0.00s</p>
            <button id="btn-claim-gem">RECOLECTAR GEMA</button>
        </div>
        <canvas id="confetti-canvas"></canvas>
    </div>

    <div id="zelda-overlay" class="hidden">
        <div class="sunburst"></div>
        <div class="zelda-gem-icon">💎</div>
        <div class="zelda-text" id="zelda-message">¡GEMA OBTENIDA!</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="gema-glb" src="crear3D.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="0 10 0" intensity="0.3"></a-light>

        <a-entity id="anchor0" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#gema-glb" scale="0.1 0.1 0.1" position="0 0 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-light id="glow0" type="point" color="#ec0000" intensity="0" distance="2" position="0 0 0.1"></a-light>
        </a-entity>

        <a-entity id="anchor1" mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#gema-glb" scale="0.1 0.1 0.1" position="0 0 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-light id="glow1" type="point" color="#ffcc00" intensity="0" distance="2" position="0 0 0.1"></a-light>
        </a-entity>

        <a-entity id="anchor2" mindar-image-target="targetIndex: 2">
            <a-gltf-model src="#gema-glb" scale="0.1 0.1 0.1" position="0 0 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>
            <a-light id="glow2" type="point" color="#00cc66" intensity="0" distance="2" position="0 0 0.1"></a-light>
        </a-entity>
    </a-scene>

    <script src="script.js"></script>
    <script>
        const sceneEl = document.querySelector('a-scene');
        const loader = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        sceneEl.addEventListener('arReady', () => {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        });

        sceneEl.addEventListener('arError', () => {
            loadingText.innerText = "ERROR AL CARGAR AR";
            loadingText.style.color = "red";
        });

        setTimeout(() => { if(loader.style.display !== 'none') { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); } }, 8000);

        // LÓGICA DE DETECCIÓN CON SUSPENSO
        let scanTimer = null;

        document.querySelectorAll('a-entity[mindar-image-target]').forEach((el, index) => {
            el.addEventListener("targetFound", () => {
                if(!isGemCollected(index) && !Batiphone.active && document.getElementById('game-overlay').classList.contains('hidden')) {
                    
                    // 1. Activar luz radioactiva
                    const glowLight = document.getElementById(`glow${index}`);
                    if(glowLight) glowLight.setAttribute('animation', 'property: intensity; from: 0; to: 8; dir: alternate; loop: true; dur: 300');

                    // 2. Esperar 2 segundos de contemplación
                    if(!scanTimer) {
                        scanTimer = setTimeout(() => {
                            Batiphone.init(index);
                            scanTimer = null;
                            if(glowLight) {
                                glowLight.removeAttribute('animation');
                                glowLight.setAttribute('intensity', '0');
                            }
                        }, 2000);
                    }
                }
            });

            // Si mueve la cámara antes de tiempo, se cancela
            el.addEventListener("targetLost", () => {
                if(scanTimer) {
                    clearTimeout(scanTimer);
                    scanTimer = null;
                    const glowLight = document.getElementById(`glow${index}`);
                    if(glowLight) {
                        glowLight.removeAttribute('animation');
                        glowLight.setAttribute('intensity', '0');
                    }
                }
            });
        });
    </script>
</body>
</html>
